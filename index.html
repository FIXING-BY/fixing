<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yönlendirme</title>
<script>
  /*
    VERİTABANI
    -----------
    Buraya "kelime adı" : "açılacak dosya" şeklinde istediğiniz kadar
    satır ekleyebilirsiniz. Örnek:
      "elma": "elma.html",
      "armut": "armut.html"
    Soldaki kısım (tırnak içindeki) linkte yazacak kelime,
    sağdaki kısım ise o kelime yazıldığında açılacak gerçek dosya.
  */
  var veriTabani = {
    "ornek1": "ornek1.html",
    "ornek2": "ornek2.html"
    // "kelime": "dosya.html"   <-- yeni eklemek için bu satırı kopyalayıp doldurun
  };

  (function () {
    var yol   = window.location.pathname; // örn: "/elma"
    var sorgu = window.location.search;   // örn: "?s=elma"
    var uzatma = yol + sorgu;             // domainden sonraki her şey

    // 1) HİÇ UZATMA YOKSA -> search.html aç
    var yolBos = (yol === "/" || yol === "" || yol === "/index.html");
    if (yolBos && sorgu === "") {
      window.location.replace("search.html");
      return;
    }

    // 2) UZATMA "/?s=" veya "?s=" İLE BAŞLIYORSA -> hiçbir şey yapma
    if (uzatma.indexOf("/?s=") === 0 || uzatma.indexOf("?s=") === 0) {
      return;
    }

    // 3) UZATMADA SADECE VERİTABANINDAKİ KELİME VARSA -> o dosyayı direkt aç
    //    (path'in başındaki/sonundaki "/" temizlenip kelime çıkarılıyor)
    var kelime = yol.replace(/^\/+/, "").replace(/\/+$/, "");

    if (kelime !== "" && veriTabani.hasOwnProperty(kelime)) {
      window.location.replace(veriTabani[kelime]);
      return;
    }

    // 4) DİĞER TÜM DURUMLAR -> hiçbir etki yok, sayfa olduğu gibi kalır
  })();
</script>
</head>
<body>
  <!-- Bu sayfanın görünür bir içeriği yok, sadece yönlendirme yapar -->
</body>
</html>
