<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Yönlendirme</title>
<script>
  /*
    DOSYA UZANTISI
    --------------
    Link sonundaki kelime ile aynı isimde, bu uzantıya sahip bir dosya
    aranacak. Örn: siteadi.com/elma  ->  elma.html dosyası var mı diye
    kontrol edilir. Dosyalarınız .php ise aşağıdaki değeri ".php" yapın.
  */
  var dosyaUzantisi = ".html";

  (function () {
    var yol   = window.location.pathname; // örn: "/elma"
    var sorgu = window.location.search;   // örn: "?s=elma"
    var uzatma = yol + sorgu;             // domainden sonraki her şey

    // 1) HİÇ UZATMA YOKSA -> search.html aç
    var yolBos = (yol === "/" || yol === "" || yol === "/index.html");
    if (yolBos && sorgu === "") {
      window.location.replace("search.html");
      return;
    }

    // 2) UZATMA "/?s=" veya "?s=" İLE BAŞLIYORSA -> hiçbir şey yapma
    if (uzatma.indexOf("/?s=") === 0 || uzatma.indexOf("?s=") === 0) {
      return;
    }

    // 3) UZATMADA SADECE BİR KELİME VARSA -> o isimde dosya gerçekten var mı diye bak
    //    (path'in başındaki/sonundaki "/" temizlenip kelime çıkarılıyor)
    var kelime = yol.replace(/^\/+/, "").replace(/\/+$/, "");

    if (kelime === "") {
      return; // kelime yoksa hiçbir şey yapma
    }

    var dosyaAdi = kelime + dosyaUzantisi;

    // Dosya yapısında bu isimde bir dosya var mı kontrol edilir
    fetch(dosyaAdi, { method: "HEAD" })
      .then(function (yanit) {
        if (yanit.ok) {
          // Dosya gerçekten varsa direkt onu aç
          window.location.replace(dosyaAdi);
        }
        // Dosya yoksa: hiçbir etki olmaz, sayfa olduğu gibi kalır
      })
      .catch(function () {
        // İstek başarısız olursa da hiçbir etki olmaz
      });

    // 4) DİĞER TÜM DURUMLAR -> hiçbir etki yok, sayfa olduğu gibi kalır
  })();
</script>
</head>
<body>
  <!-- Bu sayfanın görünür bir içeriği yok, sadece yönlendirme yapar -->
</body>
</html>
