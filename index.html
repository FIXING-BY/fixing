<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yükleniyor...</title>
<style>
  /* Minimalist ve Modern Tasarım (Soft Black & Glassmorphic) */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    background-color: #121212;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 2.5rem;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    max-width: 400px;
    width: 90%;
    display: none; /* Sadece gerçek 404 durumunda anlık görünür */
  }
  .error-code {
    font-size: 4.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: #fff;
  }
  p {
    font-size: 0.95rem;
    color: #888;
    line-height: 1.4;
  }
</style>
<script>
  (function () {
    var yol = window.location.pathname;
    var sorgu = window.location.search;
    var uzantı = ".html";

    // URL temizliği (Slaşları uçur)
    var kelime = yol.replace(/^\/+/, "").replace(/\/+$/, "");

    // Sayfayı URL değiştirmeden ekrana basan jet fonksiyon
    function sayfayiYaz(html) {
      document.open();
      document.write(html);
      document.close();
    }

    // Arama sayfasını anında arkada yükle
    function anaSayfayaGec() {
      fetch("./search.html")
        .then(function (r) { if (r.ok) return r.text(); })
        .then(function (html) { if (html) sayfayiYaz(html); });
    }

    // DURUM 1: Boş link durumu (Direkt ana dizin)
    if (kelime === "" || kelime === "index.html" || kelime === "index") {
      anaSayfayaGec();
      return;
    }

    // Kullanıcı elle .html yazdıysa adres çubuğunu temizle
    if (kelime.endsWith(uzantı)) {
      kelime = kelime.replace(uzantı, "");
      window.history.replaceState(null, "", window.location.origin + "/" + kelime + sorgu);
    }

    // DURUM 2: Tek seferde fetch ile içeriği iste (Hızın kaynağı burası)
    fetch("./" + kelime + uzantı)
      .then(function (yanit) {
        if (yanit.ok) {
          return yanit.text(); // Dosya varsa içeriği oku
        }
        throw new Error("404"); // Yoksa direkt hataya düşür
      })
      .then(function (html) {
        sayfayiYaz(html); // Varsa anında ekrana bas
      })
      .catch(function () {
        // DURUM 3: Dosya yoksa anında burası çalışır (Bekleme yok)
        var arayuzGoster = function() {
          var kutu = document.getElementById("status-box");
          if (kutu) {
            kutu.style.display = "block"; // 404 tasarımını göster
            anaSayfayaGec(); // Hiç beklemeden arkadan search.html'i yükle
          }
        };

        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", arayuzGoster);
        } else {
          arayuzGoster();
        }
      });
  })();
</script>
</head>
<body>

  <div class="container" id="status-box">
    <div class="error-code">404</div>
    <h1>Sayfa Bulunamadı</h1>
    <p>İçerik mevcut değil, arama sayfasına aktarılıyorsunuz...</p>
  </div>

</body>
</html>
