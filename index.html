<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yükleniyor...</title>
<style>
  /* Minimalist ve Modern Tasarım (Soft Black & Glassmorphic) */
  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }
  body {
    background-color: #121212;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }
  .container {
    text-align: center;
    padding: 2.5rem;
    border-radius: 16px;
    background: rgba(255, 255, 255, 0.03);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 255, 255, 0.05);
    box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    max-width: 400px;
    width: 90%;
    display: none; /* İlk başta gizli, sadece 404'te anında görünür */
  }
  .error-code {
    font-size: 4.5rem;
    font-weight: 800;
    background: linear-gradient(135deg, #ff416c, #ff4b2b);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    line-height: 1;
    margin-bottom: 1rem;
  }
  h1 {
    font-size: 1.5rem;
    margin-bottom: 0.5rem;
    color: #fff;
  }
  p {
    font-size: 0.95rem;
    color: #888;
    line-height: 1.4;
  }
</style>
<script>
  (function () {
    var yol = window.location.pathname;
    var sorgu = window.location.search;
    var uzantı = ".html";

    // URL'deki gereksiz baş/son slaşları temizle
    var kelime = yol.replace(/^\/+/, "").replace(/\/+$/, "");

    // Sayfa içeriğini URL'yi değiştirmeden ekrana basan fonksiyon
    function icerigiGetir(dosyaAdi) {
      fetch("./" + dosyaAdi)
        .then(function (yanit) {
          if (yanit.ok) return yanit.text();
          throw new Error();
        })
        .then(function (html) {
          document.open();
          document.write(html);
          document.close();
        })
        .catch(function () {
          // Eğer çağrılan dosya da (örn search.html) bir sebeple yüklenemezse 404 göster
          tetikle404();
        });
    }

    // 404 Hata Ekranını Göster ve ardından Arama İçeriğini Bas
    function tetikle404() {
      // Sayfa yüklenince 404 tasarımını görünür yap
      var arayuzYukle = function() {
        var kutu = document.getElementById("status-box");
        if (kutu) {
          kutu.style.display = "block";
          // 2 saniye sonra URL'yi değiştirmeden search içeriğini ekrana bas
          setTimeout(function() {
            icerigiGetir("search.html");
          }, 2000);
        }
      };

      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", arayuzYukle);
      } else {
        arayuzYukle();
      }
    }

    // DURUM 1: LİNKTE HİÇBİR ŞEY YOKSA (Direkt ana domain ise)
    if (kelime === "" || kelime === "index.html" || kelime === "index") {
      // URL'ye asla dokunma, "search.html" yazısını göstermeden içeriğini çek
      icerigiGetir("search.html");
      return;
    }

    // Kullanıcı elle .html yazdıysa URL temizliği yap (Görsel olarak gizle)
    if (kelime.endsWith(uzantı)) {
      kelime = kelime.replace(uzantı, "");
      window.history.replaceState(null, "", window.location.origin + "/" + kelime + sorgu);
    }

    // DURUM 2: BİR KELİME YAZILDIYSA ARKA PLANDA KONTROL ET
    fetch("./" + kelime + uzantı, { method: "HEAD" })
      .then(function (yanit) {
        if (yanit.ok) {
          // Dosya var! URL değişmeden içeriği yükle
          icerigiGetir(kelime + uzantı);
        } else {
          // Dosya yoksa modern 404 arayüzüne geç
          tetikle404();
        }
      })
      .catch(function () {
        tetikle404();
      });
  })();
</script>
</head>
<body>

  <div class="container" id="status-box">
    <div class="error-code">404</div>
    <h1>Sayfa Bulunamadı</h1>
    <p>Aradığınız içerik mevcut değil. Ana sayfaya aktarılıyorsunuz...</p>
  </div>

</body>
</html>
