<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixing Search | Direct Download</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: #121212; color: white; height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3.5rem;
            border-radius: 40px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            animation: fadeIn 0.8s ease-out;
        }

        h1 { font-size: 3rem; margin-bottom: 1rem; background: linear-gradient(to right, #fff, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .download-btn {
            display: inline-block;
            background: #fff;
            color: #000;
            padding: 1.2rem 3rem;
            border-radius: 100px;
            text-decoration: none;
            font-weight: 800;
            margin-top: 2rem;
            transition: 0.3s;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }

        .download-btn:hover {
            background: #3b82f6;
            color: #fff;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(59, 130, 246, 0.5);
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="glass-card">
        <h1>Fixing Search</h1>
        <p style="color: #888;">Modern, Hızlı, Minimalist.</p>
        
        <a href="https://drive.google.com/uc?export=download&id=12MSIH17ikRuHc1YvtFgs5CT068EOJtjg" class="download-btn">
            DİREKT İNDİR
        </a>
    </div>

</body>
</html>
