<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Fixing Search</title>
    <link rel="icon" type="image/png" href="Fixing.png" sizes="any">
    <style>
        /* --- ARAMA MOTORU CSS (TEMEL) --- */
        :root{--bg-color:#050505;--accent-color:#00e5ff;--input-bg:#0a0a0a;--text-color:#ffffff;--shadow-color:rgba(0,229,255,0.4)}
        .theme-red{--accent-color:#ff3c3c;--shadow-color:rgba(255,60,60,0.4)}
        .theme-green{--accent-color:#39ff14;--shadow-color:rgba(57,255,20,0.4)}
        .theme-purple{--accent-color:#bc13fe;--shadow-color:rgba(188,19,254,0.4)}
        .theme-gold{--accent-color:#ffd700;--shadow-color:rgba(255,215,0,0.4)}
        
        .modern-mode { --bg-color: #ffffff; --text-color: #202124; --input-bg: #ffffff; --accent-color: #4285f4; --shadow-color: rgba(66, 133, 244, 0.3); }
        .modern-mode.theme-dark { --bg-color: #171717; --text-color: #e8eaed; --input-bg: #202124; --shadow-color: rgba(138, 180, 248, 0.3); --accent-color: #8ab4f8; }
        
        body{margin:0;padding:0;background-color:var(--bg-color);display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'Inter',sans-serif;color:var(--text-color);transition:0.5s ease;overflow-x:hidden;}

        .top-nav{position:fixed;top:25px;right:25px;display:flex;gap:10px;z-index:1001}
        .nav-btn{background:rgba(255,255,255,0.03);border:1px solid #222;color:#888;padding:8px 18px;border-radius:30px;cursor:pointer;font-size:11px;letter-spacing:1px;transition:0.3s;text-transform:uppercase}
        .nav-btn:hover{border-color:var(--accent-color);color:var(--accent-color)}
        
        .main-container { display: flex; flex-direction: column; align-items: center; width: 100%; position: absolute; top: 45%; transform: translateY(-50%); transition: all 0.6s cubic-bezier(0.19, 1, 0.22, 1); z-index: 1000; }
        body.is-searching .main-container { top: 70px; transform: translateY(0); }
        
        .title{font-size:32px;font-weight:300;letter-spacing:12px;margin-bottom:25px;color:var(--accent-color); text-align: center;}
        
        .search-wrapper{
            position:relative;
            width:90%;
            max-width:550px;
            border-radius:50px;
            padding: 2px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .search-wrapper::before {
            content: "";
            position: absolute;
            width: 150%;
            height: 300%;
            background: conic-gradient(transparent, transparent, transparent, var(--accent-color));
            animation: rotateLine 3s linear infinite;
            display: none; 
        }
        
        .search-wrapper.idle-animation::before {
            display: block;
        }

        @keyframes rotateLine {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .search-input{ 
            width:100%;
            height:60px;
            background:var(--input-bg);
            border:1px solid #222; 
            border-radius:50px;
            padding:0 30px;
            font-size:17px;
            color:inherit;
            outline:none; 
            transition:all 0.4s ease; 
            box-sizing: border-box; 
            position: relative; 
            z-index: 2; 
        }
        
        .search-input:hover { border-color: var(--accent-color); box-shadow: 0 0 20px var(--shadow-color); }
        .search-input:focus { border-color: var(--accent-color); box-shadow: 0 0 30px var(--shadow-color), inset 0 0 5px var(--shadow-color); }
        
        #resultsArea { width: 90%; max-width: 650px; margin-top: 230px; display: none; flex-direction: column; gap: 20px; padding-bottom: 120px; position: relative; z-index: 100; }
        body.is-searching #resultsArea { display: flex; }
        
        .ai-result { background: rgba(0, 229, 255, 0.05); border: 1px solid var(--accent-color); padding: 20px; border-radius: 15px; margin-bottom: 10px; }
        .ai-badge { background: var(--accent-color); color: #000; font-size: 10px; font-weight: bold; padding: 3px 8px; border-radius: 4px; margin-bottom: 10px; display: inline-block; }
        
        .result-item { background: rgba(255,255,255,0.02); padding: 20px; border-radius: 12px; border: 1px solid #111; animation: fadeIn 0.4s ease forwards; }
        .res-url { color: var(--accent-color); font-size: 12px; opacity: 0.6; display: block; margin-bottom: 5px; }
        .res-title { color: inherit; font-size: 20px; text-decoration: none; font-weight: 500; display: block; margin-bottom: 8px; }
        .res-title:hover { text-decoration: underline; }
        .res-desc { color: inherit; opacity: 0.7; font-size: 14px; line-height: 1.5; margin: 0; }

        .dropdown-menu{display:none;position:absolute;top:45px;right:0;background:#0d0d0d;min-width:200px;border-radius:12px;border:1px solid #1a1a1a;z-index:1000;padding:5px 0;}
        .show{display:block}
        .dropdown-menu button { color:inherit; opacity: 0.8; padding:12px 20px; width:100%; text-align:left; background:none; border:none; cursor:pointer; font-size: 13px; }
        .dropdown-menu button:hover { background: rgba(255,255,255,0.05); color:var(--accent-color); }
        
        @keyframes fadeIn { from{opacity:0; transform:translateY(10px);} to{opacity:1; transform:translateY(0);} }

        /* --- PRO DOCK CSS --- */
        .dock-container {
            display: flex;
            padding: 0px 15px;
            background: rgba(15, 15, 15, 0.4); 
            backdrop-filter: blur(40px) saturate(150%);
            -webkit-backdrop-filter: blur(40px) saturate(150%);
            border-radius: 24px 24px 0 0; 
            border: 1px solid var(--accent-color); 
            border-bottom: none;
            box-shadow: 0 -20px 60px var(--shadow-color);
            transition: border-color 0.5s ease, box-shadow 0.5s ease;
            align-items: flex-end;
            gap: 12px;
            height: 75px;
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            z-index: 950;
        }

        .app-link { text-decoration: none; display: block; margin-bottom: 12px; }
        .app-item { position: relative; display: flex; justify-content: center; align-items: center; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); cursor: pointer; transform-origin: bottom; }
        .icon-box { width: 52px; height: 52px; background: rgba(255, 255, 255, 0.06); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border-radius: 13px; border: 1.5px solid rgba(255, 255, 255, 0.18); display: flex; justify-content: center; align-items: center; overflow: hidden; position: relative; }
        .main-logo-svg { width: 44px; height: 44px; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3)); transform: scale(1.1); }
        .bubble { width: 26px; height: 20px; background: rgba(255, 255, 255, 0.15); border-radius: 6px 6px 6px 2px; border: 1px solid rgba(255, 255, 255, 0.2); display: flex; justify-content: center; align-items: center; gap: 2px; }
        .dot-blink { width: 3px; height: 3px; background: white; border-radius: 50%; animation: blink 1.4s infinite both; }
        .cloud-icon { width: 36px; height: 36px; background: rgba(255, 255, 255, 0.25); clip-path: path('M18,10 C14,10 11,13 11,17 C11,17 7,17 7,21 C7,25 10,28 14,28 L26,28 C30,28 33,25 33,21 C33,17 30,14 26,14 C25.5,14 25,14.1 24.5,14.2 C23,11.5 20,10 18,10 Z'); }
        .ai-text { font-size: 20px; font-weight: 900; color: rgba(255, 255, 255, 0.8); letter-spacing: -1px; }
        .cal-31 { font-size: 22px; font-weight: 700; color: #fff; letter-spacing: -1px; }

        .app-item:hover { transform: scale(1.5) translateY(-15px); }
        .app-item::before { content: attr(data-name); position: absolute; top: -55px; background: rgba(0, 0, 0, 0.85); color: white; padding: 5px 12px; border-radius: 8px; font-size: 11px; opacity: 0; pointer-events: none; transition: opacity 0.2s; white-space: nowrap; }
        .app-item:hover::before { opacity: 1; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-40px); } }
        .bounce { animation: bounce 0.5s ease-in-out; }
        @keyframes blink { 0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); } 40% { opacity: 1; transform: scale(1.1); } }
        .dot-blink:nth-child(2) { animation-delay: 0.2s; }
        .dot-blink:nth-child(3) { animation-delay: 0.4s; }
    </style>
</head>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwP9iEIBFqWTWUc_yDwGsQgdju2mCL1HBpxqJZRSSljZg_uC_Ry_G9EXeA8tr4noLMANw/exec";
const searchDB_URL = "https://raw.githubusercontent.com/FIXING-BY/Search/main/thesearch.txt";
const qonoDB_URL = "https://raw.githubusercontent.com/FIXING-BY/search/refs/heads/main/Qono.html.s.txt"; 

const GROQ_API_KEY = "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";
const GROQ_MODEL = "llama-3.3-70b-versatile";

let searchDatabase = [];
let qonoDatabase = [];
let aiEnabled = localStorage.getItem("aiEnabled") !== "false";
let isModern = localStorage.getItem("isModern") !== null ? localStorage.getItem("isModern") === "true" : true;
let currentTheme = localStorage.getItem("fixingTheme") !== null ? localStorage.getItem("fixingTheme") : "theme-dark";
let idleTimer;

function fixText(text) {
    if (!text) return "";
    return text.toString().toLowerCase()
        .replace(/ı/g, 'i').replace(/İ/g, 'i')
        .replace(/ş/g, 's').replace(/Ş/g, 's')
        .replace(/ğ/g, 'g').replace(/Ğ/g, 'g')
        .replace(/ü/g, 'u').replace(/Ü/g, 'u')
        .replace(/ö/g, 'o').replace(/Ö/g, 'o')
        .replace(/ç/g, 'c').replace(/Ç/g, 'c').trim();
}

async function loadDatabases() {
    try {
        const rSearch = await fetch(searchDB_URL);
        const tSearch = await rSearch.text();
        searchDatabase = tSearch.split('\n').map(line => {
            const parts = line.split('|');
            return parts.length >= 2 ? { 
                title: parts[0].trim(), 
                url: parts[1].trim(), 
                desc: parts[2]?.trim() || "",
                rank: parts.length >= 4 ? parseInt(parts[3].trim()) || 9999 : 9999
            } : null;
        }).filter(Boolean);
        
        searchDatabase.sort((a, b) => a.rank - b.rank);

        const rQono = await fetch(qonoDB_URL);
        const tQono = await rQono.text();
        qonoDatabase = tQono.split('\n').map(line => {
            const parts = line.split('|');
            return parts.length >= 3 ? { 
                enName: parts[0].trim(), 
                trName: parts[1].trim(), 
                url: parts[2].trim() 
            } : null;
        }).filter(Boolean);
        
        const params = new URLSearchParams(window.location.search);
        const query = params.get('s');
        if (query) {
            document.getElementById('fixSearch').value = query;
            doSearch();
        }
    } catch(e) { console.error("Bağlantı hatası"); }
}

function resetIdleTimer() {
    document.getElementById('sWrapper').classList.remove('idle-animation');
    clearTimeout(idleTimer);
    idleTimer = setTimeout(() => {
        document.getElementById('sWrapper').classList.add('idle-animation');
    }, 5000);
}

async function getAIResponse(userQuery) {
    const aiTextDiv = document.getElementById('aiText');
    const air = document.getElementById('aiResponse');
    
    aiTextDiv.innerText = "Fix AI düşünüyor...";
    air.style.display = "block";

    await new Promise(resolve => setTimeout(resolve, 1200));

    try {
        const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
            method: "POST",
            headers: {
                "Authorization": `Bearer ${GROQ_API_KEY}`,
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                model: GROQ_MODEL,
                messages: [
                    { role: "system", content: "Sen Qono AI'sın. Modelin Fix AI'dır. Sadece Türkçe konuşmalısın ve başka hiçbir dilde veya formatta cevap vermemelisin." },
                    { role: "user", content: userQuery }
                ]
            })
        });
        const data = await response.json();
        const aiAnswer = data.choices[0].message.content;
        aiTextDiv.innerText = aiAnswer;
    } catch (error) {
        console.error("AI Hatası:", error);
        aiTextDiv.innerText = "AI şu an cevap veremiyor.";
    }
}

async function doSearch() {
    resetIdleTimer();
    const val = document.getElementById('fixSearch').value.trim();
    
    const newURL = new URL(window.location.href);
    if(val) { newURL.searchParams.set('s', val); } else { newURL.searchParams.delete('s'); }
    window.history.replaceState({}, '', newURL);

    const fixedVal = fixText(val);
    const resDiv = document.getElementById('searchResults');
    const air = document.getElementById('aiResponse');
    
    if(val === "") {
        document.body.classList.remove('is-searching');
        resDiv.innerHTML = ""; air.style.display = "none"; return;
    }

    document.body.classList.add('is-searching');
    resDiv.innerHTML = ""; air.style.display = "none";

    if(aiEnabled) {
        getAIResponse(val);
    }

    for (let item of qonoDatabase) {
        if (fixText(item.enName).includes(fixedVal) || fixText(item.trName).includes(fixedVal)) {
            const wDiv = document.createElement('div');
            wDiv.className = 'result-item';
            wDiv.style.border = '1px solid var(--accent-color)';
            
            const frameId = 'qonoFrame_' + Math.random().toString(36).substring(7);

            wDiv.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <span style="color:var(--accent-color); font-weight:bold; font-size:16px;">${item.trName} / ${item.enName}</span>
                    <button onclick="document.getElementById('${frameId}').requestFullscreen()" style="background:var(--accent-color); color:#000; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-weight:bold; font-size:12px; transition:0.3s;">Tam Ekran</button>
                </div>
                <iframe id="${frameId}" style="width:100%; height:300px; border:none; border-radius:8px; background:#fff;" allowfullscreen></iframe>
            `;
            resDiv.appendChild(wDiv);

            fetch(item.url)
                .then(res => res.text())
                .then(html => {
                    document.getElementById(frameId).srcdoc = html;
                })
                .catch(err => {
                    console.error("Qono iframe yükleme hatası", err);
                });

            break; 
        }
    }

    let matches = [];
    let exactMatchFound = false;

    for (let item of searchDatabase) {
        const itemTitleFixed = fixText(item.title);
        const itemDescFixed = fixText(item.desc);

        if (itemTitleFixed === fixedVal) {
            exactMatchFound = true;
        }

        if (itemTitleFixed.includes(fixedVal) || itemDescFixed.includes(fixedVal)) {
            matches.push(item);
        }
    }

    const finalResults = exactMatchFound ? matches : matches.slice(0, 10);

    finalResults.forEach(item => {
        const d = document.createElement('div');
        d.className = 'result-item';
        d.innerHTML = `<span class="res-url">${item.url}</span><a href="${item.url}" target="_self" class="res-title">${item.title}</a><p class="res-desc">${item.desc}</p>`;
        resDiv.appendChild(d);
    });
}

document.getElementById('fixSearch').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const val = e.target.value.trim();
        if (!val) return;
        const fixedVal = fixText(val);
        const exactMatch = searchDatabase.find(item => fixText(item.title) === fixedVal);
        if (exactMatch) { window.location.href = exactMatch.url; }
    }
});

function toggleAI() { aiEnabled = !aiEnabled; localStorage.setItem("aiEnabled", aiEnabled); document.getElementById('aiToggleBtn').innerText = `Fix AI: ${aiEnabled ? 'AÇIK' : 'KAPALI'}`; doSearch(); }
function toggleStyleMode() { isModern = !isModern; localStorage.setItem("isModern", isModern); updateUI(); }
function changeTheme(t) { currentTheme = t; localStorage.setItem("fixingTheme", t); updateUI(); }

function updateUI() {
    document.getElementById('mainBody').className = (isModern ? 'modern-mode ' : '') + currentTheme;
    document.getElementById('styleToggleBtn').innerText = `GÖRÜNÜM: ${isModern ? 'MODERN' : 'FİXİNG'}`;
}

function checkUser() {
    const u = localStorage.getItem("aktifKullanici");
    if(u) {
        document.getElementById('loginBtn').style.display='none';
        document.getElementById('userSection').style.display='block';
        document.getElementById('userBtn').innerText = u.toUpperCase();
    }
}

function toggleMenu(id) {
    document.querySelectorAll('.dropdown-menu').forEach(m => { if(m.id !== id) m.classList.remove('show'); });
    document.getElementById(id).classList.toggle("show");
}

function logout() { localStorage.removeItem("aktifKullanici"); location.reload(); }

document.getElementById('fixSearch').addEventListener('input', doSearch);

document.querySelectorAll('.app-link').forEach(link => {
    link.addEventListener('click', function(e) {
        const item = this.querySelector('.app-item');
        item.classList.add('bounce');
        e.preventDefault();
        const targetUrl = this.href;
        setTimeout(() => { window.location.href = targetUrl; item.classList.remove('bounce'); }, 450);
    });
});

window.onload = () => { updateUI(); checkUser(); loadDatabases(); resetIdleTimer(); document.querySelector('.cal-31').innerText = new Date().getDate(); };
</script>
